services:
  postgres:
    image: postgres:16-alpine
    container_name: tennisscore-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:?DB_NAME is required}
      POSTGRES_USER: ${DB_USER:?DB_USER is required}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - tennisscore-internal

  migrations:
    image: ${MIGRATIONS_IMAGE:-1fini/tennisscoreapi-migrations:latest}
    container_name: tennisscore-migrations
    profiles:
      - migrations
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:?DB_NAME is required}
      DB_USER: ${DB_USER:?DB_USER is required}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    networks:
      - tennisscore-internal

  api:
    image: ${API_IMAGE:-1fini/tennisscoreapi:latest}
    container_name: tennisscore-api
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      ASPNETCORE_URLS: http://+:8080
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:?DB_NAME is required}
      DB_USER: ${DB_USER:?DB_USER is required}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    expose:
      - "8080"
    networks:
      - tennisscore-internal

  webapp:
    image: ${WEBAPP_IMAGE:-1fini/tennisscore-webapp:latest}
    container_name: tennisscore-webapp
    restart: unless-stopped
    depends_on:
      - api
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      ASPNETCORE_URLS: http://+:8080
      ENABLE_HTTPS_REDIRECTION: ${ENABLE_HTTPS_REDIRECTION:-false}
      SCORE_API_URL: http://api:8080/
      SCOREHUB_URL: http://api:8080/scoreHub
    ports:
      - "${WEBAPP_HTTP_PORT:-8080}:8080"
    networks:
      - tennisscore-internal

volumes:
  postgres_data:

networks:
  tennisscore-internal:
    driver: bridge
